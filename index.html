<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Университеты Казахстана</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .search-container {
            padding: 30px;
            background: #f8f9fa;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .universities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
            min-height: 200px;
        }

        .university-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .university-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-color: #667eea;
        }

        .university-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .university-detail {
            padding: 30px;
            display: none;
        }

        .university-detail.active {
            display: block;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .detail-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .detail-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .detail-section p {
            line-height: 1.8;
            color: #333;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #667eea;
        }

        .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #dc3545;
        }

        .floating-btn {
            position: fixed;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
        }

        .floating-btn:hover {
            transform: scale(1.1);
        }

        .chat-btn {
            left: 30px;
            background: #667eea;
            color: white;
            display: none;
        }

        .chat-btn.active {
            display: block;
        }

        .compare-btn {
            right: 30px;
            background: #764ba2;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: 20%;
        }

        .message.bot {
            background: #e0e0e0;
            margin-right: 20%;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        .compare-selects {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .compare-selects select {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .compare-result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Университеты Казахстана</h1>
            <p>Выберите университет для подробной информации</p>
        </header>

        <!-- Список университетов -->
        <div id="universityList">
            <div class="search-container">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск университета...">
            </div>
            <div class="universities-grid" id="universitiesGrid">
                <div class="loading">⏳ Загрузка данных...</div>
            </div>
        </div>

        <!-- Детальная информация -->
        <div id="universityDetail" class="university-detail">
            <button class="back-btn" onclick="showList()">← Назад к списку</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Кнопки -->
    <button class="floating-btn chat-btn" id="chatBtn" onclick="openChat()">💬</button>
    <button class="floating-btn compare-btn" onclick="openCompare()">⚖️</button>

    <!-- Модальное окно чата -->
    <div class="modal" id="chatModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeChat()">&times;</span>
            <h2>💬 Чат об университете</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
                <button class="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно сравнения -->
    <div class="modal" id="compareModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCompare()">&times;</span>
            <h2>⚖️ Сравнение университетов</h2>
            <div class="compare-selects">
                <select id="uni1Select"></select>
                <select id="uni2Select"></select>
            </div>
            <button class="back-btn" onclick="compareUniversities()">Сравнить</button>
            <div class="compare-result" id="compareResult"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let universities = [];
        let currentUniversityId = null;
        let chatHistory = [];

        // Загрузка университетов
        async function loadUniversities() {
            try {
                console.log('Загрузка университетов...');
                const response = await fetch(`${API_URL}/universities`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                universities = await response.json();
                console.log('Загружено университетов:', universities.length);
                
                if (universities.length === 0) {
                    document.getElementById('universitiesGrid').innerHTML = 
                        '<div class="error">⚠️ Нет данных об университетах</div>';
                } else {
                    displayUniversities(universities);
                    populateSelects();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('universitiesGrid').innerHTML = 
                    `<div class="error">❌ Ошибка загрузки: ${error.message}<br><br>Убедитесь, что сервер запущен на http://localhost:5000</div>`;
            }
        }

        // Отображение списка университетов
        function displayUniversities(unis) {
            const grid = document.getElementById('universitiesGrid');
            
            if (unis.length === 0) {
                grid.innerHTML = '<div class="error">Университеты не найдены</div>';
                return;
            }
            
            grid.innerHTML = unis.map(uni => `
                <div class="university-card" onclick="showUniversity(${uni.id})">
                    <h3>${uni.name || 'Без названия'}</h3>
                    <p>${(uni.description || 'Описание отсутствует').substring(0, 100)}...</p>
                </div>
            `).join('');
        }

        // Показать детали университета
        async function showUniversity(id) {
            currentUniversityId = id;
            chatHistory = [];
            
            document.getElementById('universityList').classList.add('hidden');
            document.getElementById('universityDetail').classList.add('active');
            document.getElementById('chatBtn').classList.add('active');
            
            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = '<div class="loading">⏳ Загрузка информации...</div>';
            
            try {
                const response = await fetch(`${API_URL}/university/${id}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                detailContent.innerHTML = `
                    <h1 style="color: #667eea; margin-bottom: 20px;">${data.name}</h1>
                    
                    <div class="detail-section">
                        <h2>📝 Описание университета</h2>
                        <p>${data.description || 'Описание отсутствует'}</p>
                        <p><strong>Сайт:</strong> <a href="${data.website}" target="_blank">${data.website}</a></p>
                        <p><strong>Контакты:</strong> ${data.contacts || 'Не указаны'}</p>
                    </div>
                    
                    <div class="detail-section">
                        <h2>🎯 Академические программы</h2>
                        <p><strong>Специальности:</strong> ${data.specialties || 'Не указаны'}</p>
                        <p>${data.chatgpt_data?.academic_programs || 'Информация загружается...'}</p>
                    </div>
                    
                    <div class="detail-section">
                        <h2>📋 Прием и поступление</h2>
                        <p>${data.chatgpt_data?.admission_info || 'Информация загружается...'}</p>
                    </div>
                    
                    <div class="detail-section">
                        <h2>🌐 Международное сотрудничество</h2>
                        <p>${data.chatgpt_data?.international_cooperation || 'Информация загружается...'}</p>
                    </div>
                    
                    <div class="detail-section">
                        <h2>💡 Общая информация и советы от AI</h2>
                        <p>${data.chatgpt_data?.general_info || 'Информация загружается...'}</p>
                    </div>
                `;
            } catch (error) {
                console.error('Ошибка загрузки деталей:', error);
                detailContent.innerHTML = `<div class="error">❌ Ошибка загрузки данных: ${error.message}</div>`;
            }
        }

        // Показать список
        function showList() {
            document.getElementById('universityList').classList.remove('hidden');
            document.getElementById('universityDetail').classList.remove('active');
            document.getElementById('chatBtn').classList.remove('active');
            currentUniversityId = null;
            chatHistory = [];
        }

        // Поиск
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const search = e.target.value;
            try {
                const response = await fetch(`${API_URL}/universities?search=${search}`);
                const filtered = await response.json();
                displayUniversities(filtered);
            } catch (error) {
                console.error('Ошибка поиска:', error);
            }
        });

        // Чат
        function openChat() {
            if (currentUniversityId === null) return;
            document.getElementById('chatModal').classList.add('active');
            document.getElementById('chatMessages').innerHTML = 
                '<div class="message bot">Здравствуйте! Задайте мне вопрос об этом университете.</div>';
        }

        function closeChat() {
            document.getElementById('chatModal').classList.remove('active');
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || currentUniversityId === null) return;
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            
            // Добавляем в историю
            chatHistory.push({role: 'user', content: message});
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        university_id: currentUniversityId,
                        message: message,
                        history: chatHistory
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                messagesDiv.innerHTML += `<div class="message bot">${data.response}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                // Добавляем ответ в историю
                chatHistory.push({role: 'assistant', content: data.response});
                
            } catch (error) {
                console.error('Ошибка чата:', error);
                messagesDiv.innerHTML += `<div class="message bot">❌ Ошибка: ${error.message}</div>`;
            }
        }

        // Сравнение
        function populateSelects() {
            const select1 = document.getElementById('uni1Select');
            const select2 = document.getElementById('uni2Select');
            const options = universities.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            select1.innerHTML = options;
            select2.innerHTML = options;
            if (universities.length > 1) {
                select2.selectedIndex = 1;
            }
        }

        function openCompare() {
            document.getElementById('compareModal').classList.add('active');
            document.getElementById('compareResult').innerHTML = '';
        }

        function closeCompare() {
            document.getElementById('compareModal').classList.remove('active');
        }

        async function compareUniversities() {
            const uni1 = document.getElementById('uni1Select').value;
            const uni2 = document.getElementById('uni2Select').value;
            
            if (uni1 === uni2) {
                alert('Выберите разные университеты для сравнения');
                return;
            }
            
            const resultDiv = document.getElementById('compareResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Сравнение...</div>';
            
            try {
                const response = await fetch(`${API_URL}/compare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        university1_id: parseInt(uni1),
                        university2_id: parseInt(uni2)
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <h3>${data.university1} vs ${data.university2}</h3>
                    <p>${data.comparison}</p>
                `;
            } catch (error) {
                console.error('Ошибка сравнения:', error);
                resultDiv.innerHTML = `<p class="error">❌ Ошибка сравнения: ${error.message}</p>`;
            }
        }

        // Enter для отправки сообщения
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Инициализация
        console.log('Инициализация приложения...');
        loadUniversities();
    </script>
</body>
</html>
